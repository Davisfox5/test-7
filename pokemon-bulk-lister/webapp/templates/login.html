<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log in — Pokémon Card Portfolio</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='portfolio.css') }}">
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1>Card Portfolio</h1>
    <p class="auth-sub">Track what your collection is worth — live.</p>
    {% if error %}<p class="auth-error">{{ error }}</p>{% endif %}
    <form method="post" action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
      <label>Email
        <input type="email" name="email" required autocomplete="email" autofocus>
      </label>
      <label>Password
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn btn-primary">Log in</button>
    </form>
    <p class="auth-alt">No account? <a href="/register">Create one</a></p>
    <p class="auth-alt"><a href="/">← back to the processing bench</a></p>
  </main>
</body>
</html>
